<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job / Booking Tracker</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      color: #1f2937;
      line-height: 1.5;
    }

    .app {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 28px 16px;
    }

    header {
      margin-bottom: 24px;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1.2;
    }

    h1 {
      font-size: 2rem;
      font-weight: 750;
    }

    h2 {
      font-size: 1.25rem;
      margin-bottom: 14px;
    }

    .intro {
      margin: 8px 0 0;
      color: #5f6b7a;
    }

    section {
      background: #ffffff;
      border: 1px solid #d9dee5;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 22px;
    }

    form {
      display: grid;
      gap: 12px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 5px;
      font-size: 0.94rem;
      font-weight: 650;
    }

    input,
    select {
      width: 100%;
      border: 1px solid #c8d0da;
      border-radius: 6px;
      padding: 10px 11px;
      background: #ffffff;
      color: #1f2937;
      font: inherit;
    }

    .helper-text {
      margin: 10px 0 0;
      color: #7b8794;
      font-size: 0.9rem;
    }

    input:focus,
    select:focus {
      outline: 3px solid #d8e8ff;
      border-color: #2f6fed;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .add-button {
      width: fit-content;
      background: #1f6feb;
      color: #ffffff;
    }

    .delete-button {
      background: #f2f4f7;
      color: #334155;
      border: 1px solid #d9dee5;
      padding: 7px 10px;
      font-size: 0.9rem;
    }

    button:hover {
      filter: brightness(0.97);
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th,
    td {
      padding: 12px 10px;
      border-bottom: 1px solid #e5e9ef;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #526071;
      font-size: 0.86rem;
      font-weight: 750;
      background: #f8fafc;
    }

    td {
      font-size: 0.95rem;
    }

    .status {
      display: inline-block;
      border: 0;
      border-radius: 999px;
      padding: 3px 9px;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .status-pending {
      background: #eceff3;
      color: #374151;
    }

    .status-progress {
      background: #ffe9c2;
      color: #8a4b00;
    }

    .status-done {
      background: #dcf5e3;
      color: #176b31;
    }

    .empty {
      margin: 0;
      padding: 18px;
      border: 1px dashed #c8d0da;
      border-radius: 8px;
      color: #64748b;
      background: #f8fafc;
    }

    @media (max-width: 680px) {
      .app {
        padding: 20px 12px;
      }

      h1 {
        font-size: 1.55rem;
      }

      section {
        padding: 16px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .add-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Job / Booking Tracker</h1>
      <p class="intro">A simple way to keep track of jobs without messages getting messy.</p>
    </header>

    <section aria-labelledby="add-job-heading">
      <h2 id="add-job-heading">Add New Job</h2>

      <form id="jobForm">
        <div class="form-grid">
          <label>
            Client Name
            <input id="clientName" type="text" placeholder="Sarah Johnson" required />
          </label>

          <label>
            Job Type
            <select id="jobType" required>
              <option value="Cleaning">Cleaning</option>
              <option value="Gardening">Gardening</option>
              <option value="General Job">General Job</option>
            </select>
          </label>

          <label>
            Notes
            <input id="notes" type="text" placeholder="Weekly clean, needs invoice, morning preferred" />
          </label>

          <label>
            Date
            <input id="jobDate" type="date" required />
          </label>

          <label>
            Status
            <select id="status" required>
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select>
          </label>
        </div>

        <button class="add-button" type="submit">Add Job</button>
      </form>

      <p class="helper-text">Add a job to start keeping everything in one place 👍</p>
    </section>

    <section aria-labelledby="current-jobs-heading">
      <h2 id="current-jobs-heading">Current Jobs</h2>

      <div class="table-wrap" id="jobTableWrap">
        <table>
          <thead>
            <tr>
              <th>Client Name</th>
              <th>Job Type</th>
              <th>Date</th>
              <th>Status</th>
              <th>Notes</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="jobList"></tbody>
        </table>
      </div>

      <p class="empty" id="emptyMessage" hidden>No jobs yet — add one above to get started 👍</p>
    </section>
  </main>

  <script>
    const jobs = [
      {
        clientName: "Sarah Johnson",
        jobType: "Cleaning",
        date: "2026-06-01",
        status: "Pending",
        notes: "Weekly clean. Has dog at home."
      },
      {
        clientName: "Ned Kelly",
        jobType: "Gardening",
        date: "2026-06-06",
        status: "In Progress",
        notes: "Lawn mowing. Every Saturday."
      },
      {
        clientName: "Shane Warne",
        jobType: "Cleaning",
        date: "2026-06-10",
        status: "Done",
        notes: "Bond clean. Needs invoice."
      },
      {
        clientName: "David Nguyen",
        jobType: "General Job",
        date: "2026-06-12",
        status: "Pending",
        notes: "Small repairs. Morning preferred."
      },
      {
        clientName: "Priya Patel",
        jobType: "Gardening",
        date: "2026-06-14",
        status: "Pending",
        notes: "Hedge trim and green waste removal."
      }
    ];

    const jobForm = document.querySelector("#jobForm");
    const clientNameInput = document.querySelector("#clientName");
    const jobTypeInput = document.querySelector("#jobType");
    const notesInput = document.querySelector("#notes");
    const jobDateInput = document.querySelector("#jobDate");
    const statusInput = document.querySelector("#status");
    const jobList = document.querySelector("#jobList");
    const jobTableWrap = document.querySelector("#jobTableWrap");
    const emptyMessage = document.querySelector("#emptyMessage");

    jobForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const job = {
        clientName: clientNameInput.value.trim(),
        jobType: jobTypeInput.value,
        notes: notesInput.value.trim(),
        date: jobDateInput.value,
        status: statusInput.value
      };

      if (!job.clientName || !job.date) {
        return;
      }

      jobs.push(job);
      jobForm.reset();
      renderJobs();
      clientNameInput.focus();
    });

    jobList.addEventListener("click", function (event) {
      const statusButton = event.target.closest(".status");
      const deleteButton = event.target.closest(".delete-button");

      if (statusButton) {
        const jobIndex = Number(statusButton.dataset.index);
        jobs[jobIndex].status = getNextStatus(jobs[jobIndex].status);
        renderJobs();
        return;
      }

      if (!deleteButton) {
        return;
      }

      const jobIndex = Number(deleteButton.dataset.index);
      jobs.splice(jobIndex, 1);
      renderJobs();
    });

    function renderJobs() {
      jobList.innerHTML = "";

      jobTableWrap.hidden = jobs.length === 0;
      emptyMessage.hidden = jobs.length > 0;

      jobs.forEach(function (job, index) {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td></td>
          <td></td>
          <td></td>
          <td><button class="status" type="button" data-index="${index}" aria-label="Change job status"></button></td>
          <td></td>
          <td><button class="delete-button" type="button" data-index="${index}">Delete</button></td>
        `;

        row.children[0].textContent = job.clientName;
        row.children[1].textContent = job.jobType;
        row.children[2].textContent = formatDate(job.date);
        row.children[4].textContent = job.notes || "-";

        const statusLabel = row.querySelector(".status");
        statusLabel.textContent = job.status;
        statusLabel.classList.add(getStatusClass(job.status));

        jobList.appendChild(row);
      });
    }

    function getStatusClass(status) {
      if (status === "In Progress") {
        return "status-progress";
      }

      if (status === "Done") {
        return "status-done";
      }

        return "status-pending";
    }

    function getNextStatus(status) {
      if (status === "Pending") {
        return "In Progress";
      }

      if (status === "In Progress") {
        return "Done";
      }

      return "Pending";
    }

    function formatDate(dateValue) {
      if (!dateValue) {
        return "-";
      }

      const date = new Date(dateValue + "T00:00:00");

      return date.toLocaleDateString(undefined, {
        day: "numeric",
        month: "short",
        year: "numeric"
      });
    }

    renderJobs();
  </script>
</body>
</html>
